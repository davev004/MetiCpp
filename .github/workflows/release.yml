name: Release MetiC++

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        arch: [popcnt, avx2, avx512]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile Engine
        shell: bash
        run: |
          # 1. Select the correct branchless/hardware GCC flags
          if [ "${{ matrix.arch }}" == "popcnt" ]; then
            FLAGS="-O3 -march=x86-64 -mpopcnt"
          elif [ "${{ matrix.arch }}" == "avx2" ]; then
            FLAGS="-O3 -march=x86-64-v3" 
          elif [ "${{ matrix.arch }}" == "avx512" ]; then
            FLAGS="-O3 -march=x86-64-v4" 
          fi

          # 2. Define the clean output binary name
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            BIN_NAME="MetiCpp-windows-${{ github.ref_name }}-${{ matrix.arch }}.exe"
          else
            BIN_NAME="MetiCpp-linux-${{ github.ref_name }}-${{ matrix.arch }}"
          fi

          # 3. Compile all source files
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            # Full static linking for Windows to bundle gcc, stdc++, and winpthread
            g++ -std=c++17 -flto -static -static-libgcc -static-libstdc++ $FLAGS src/*.cpp -o $BIN_NAME
          else
            # Safe static linking for Linux C/C++ runtimes (avoids GLIBCXX errors)
            g++ -std=c++17 -flto -static-libgcc -static-libstdc++ $FLAGS src/*.cpp -o $BIN_NAME
          fi

      - name: Upload Binary to Job Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: MetiCpp-*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all Compiled Binaries
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true